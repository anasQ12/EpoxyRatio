<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Epoxy Resin Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --amber: #e8a030;
    --amber-dim: #a06a18;
    --amber-glow: rgba(232, 160, 48, 0.15);
    --text: #e8e0d0;
    --text-dim: #7a7060;
    --resin: #f5c842;
    --hardener: #60c8e8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 999;
    opacity: 0.4;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 10vw, 80px);
    letter-spacing: 0.08em;
    line-height: 1;
    color: var(--amber);
    text-shadow: 0 0 60px rgba(232,160,48,0.4);
    animation: flicker 8s infinite;
  }

  .subtitle {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-top: 8px;
  }

  @keyframes flicker {
    0%,96%,100% { opacity: 1; }
    97% { opacity: 0.85; }
    98% { opacity: 1; }
    99% { opacity: 0.9; }
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 32px;
    width: 100%;
    max-width: 520px;
    margin-bottom: 24px;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  /* Ratio selector */
  .ratio-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 28px;
  }

  .ratio-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 14px 10px;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: center;
  }

  .ratio-btn:hover {
    border-color: var(--amber-dim);
    background: var(--amber-glow);
  }

  .ratio-btn.active {
    border-color: var(--amber);
    background: var(--amber-glow);
    box-shadow: 0 0 20px rgba(232,160,48,0.15);
  }

  .ratio-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.05em;
    color: var(--amber);
    margin-bottom: 4px;
  }

  .ratio-desc {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  /* Input section */
  .input-row {
    display: flex;
    gap: 12px;
    align-items: flex-end;
    margin-bottom: 28px;
  }

  .input-group {
    flex: 1;
  }

  .input-label {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }

  .input-wrap {
    position: relative;
  }

  .main-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    padding: 12px 56px 12px 16px;
    outline: none;
    transition: border-color 0.15s;
    -moz-appearance: textfield;
  }
  .main-input::-webkit-outer-spin-button,
  .main-input::-webkit-inner-spin-button { -webkit-appearance: none; }

  .main-input:focus {
    border-color: var(--amber);
    box-shadow: 0 0 0 2px var(--amber-glow);
  }

  .unit-badge {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .unit-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 12px 14px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.15s;
    min-width: 80px;
    height: 52px;
  }

  .unit-select:focus { border-color: var(--amber); }

  /* Results */
  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .result-box {
    border-radius: 2px;
    padding: 20px 16px;
    position: relative;
    overflow: hidden;
  }

  .result-box.resin {
    background: rgba(245, 200, 66, 0.07);
    border: 1px solid rgba(245, 200, 66, 0.3);
  }

  .result-box.hardener {
    background: rgba(96, 200, 232, 0.07);
    border: 1px solid rgba(96, 200, 232, 0.3);
  }

  .result-box::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
  }
  .result-box.resin::after { background: var(--resin); }
  .result-box.hardener::after { background: var(--hardener); }

  .result-label {
    font-size: 10px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .result-box.resin .result-label { color: rgba(245,200,66,0.7); }
  .result-box.hardener .result-label { color: rgba(96,200,232,0.7); }

  .result-component {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .result-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 0.03em;
    line-height: 1;
  }
  .result-box.resin .result-value { color: var(--resin); }
  .result-box.hardener .result-value { color: var(--hardener); }

  .result-unit {
    font-size: 12px;
    letter-spacing: 0.15em;
    margin-left: 4px;
    vertical-align: middle;
    opacity: 0.7;
  }

  /* Total bar */
  .total-bar {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .total-label {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .total-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--amber);
    letter-spacing: 0.05em;
  }

  /* Visual bar */
  .mix-visual {
    height: 12px;
    border-radius: 1px;
    overflow: hidden;
    display: flex;
    background: var(--surface2);
    border: 1px solid var(--border);
    margin-bottom: 8px;
  }

  .bar-a {
    background: linear-gradient(90deg, var(--resin), rgba(245,200,66,0.7));
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    height: 100%;
  }

  .bar-b {
    background: linear-gradient(90deg, rgba(96,200,232,0.7), var(--hardener));
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    height: 100%;
  }

  .bar-labels {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  /* Tips */
  .tip-box {
    background: var(--surface2);
    border-left: 2px solid var(--amber-dim);
    padding: 12px 16px;
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.6;
    letter-spacing: 0.03em;
  }

  .tip-box strong {
    color: var(--amber);
    letter-spacing: 0.1em;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 20px 0;
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 0.2em;
  }

  .empty-icon {
    font-size: 32px;
    margin-bottom: 8px;
    opacity: 0.3;
  }

  /* Animate in */
  .card { animation: fadeUp 0.4s ease both; }
  .card:nth-child(2) { animation-delay: 0.08s; }
  .card:nth-child(3) { animation-delay: 0.16s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-updated {
    animation: pulse 0.3s ease;
  }

  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.04); }
    100% { transform: scale(1); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">EPOXY<br>CALC</div>
  <div class="subtitle">Resin · Hardener · Mix Ratio Tool</div>
</header>

<!-- Step 1: Ratio -->
<div class="card">
  <div class="section-label">01 — Select Mix Ratio</div>
  <div class="ratio-grid">
    <div class="ratio-btn active" onclick="selectRatio(0, this)">
      <div class="ratio-name">10:6</div>
      <div class="ratio-desc">A : B</div>
    </div>
    <div class="ratio-btn" onclick="selectRatio(1, this)">
      <div class="ratio-name">2:1</div>
      <div class="ratio-desc">A : B</div>
    </div>
    <div class="ratio-btn" onclick="selectRatio(2, this)">
      <div class="ratio-name">1:1</div>
      <div class="ratio-desc">A : B</div>
    </div>
  </div>
  <div class="tip-box" id="ratio-tip">
    <strong>10:6</strong> — By weight or volume. For every 10 parts resin, add 6 parts hardener.
  </div>
</div>

<!-- Step 2: Amount -->
<div class="card">
  <div class="section-label">02 — Enter Total Amount</div>
  <div class="input-row">
    <div class="input-group">
      <label class="input-label" for="amount">Total mix needed</label>
      <div class="input-wrap">
        <input class="main-input" id="amount" type="number" min="0" step="any" placeholder="0" oninput="calculate()">
        <span class="unit-badge" id="unit-badge">g</span>
      </div>
    </div>
    <select class="unit-select" id="unit" onchange="updateUnit(); calculate()">
      <option value="g">g</option>
      <option value="ml">ml</option>
      <option value="kg">kg</option>
      <option value="oz">oz</option>
    </select>
  </div>
</div>

<!-- Step 3: Results -->
<div class="card">
  <div class="section-label">03 — Results</div>
  <div id="results-area">
    <div class="empty-state">
      <div class="empty-icon">⚗️</div>
      Enter an amount above to calculate
    </div>
  </div>
</div>

<script>
  const ratios = [
    { a: 10, b: 6, label: '10:6', tip: '<strong>10:6</strong> — For every 10 parts resin (A), add 6 parts hardener (B). Total parts = 16.' },
    { a: 2,  b: 1, label: '2:1',  tip: '<strong>2:1</strong> — For every 2 parts resin (A), add 1 part hardener (B). Total parts = 3.' },
    { a: 1,  b: 1, label: '1:1',  tip: '<strong>1:1</strong> — Equal parts resin (A) and hardener (B). Total parts = 2.' },
  ];

  let currentRatio = 0;

  function selectRatio(index, el) {
    currentRatio = index;
    document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('ratio-tip').innerHTML = ratios[index].tip;
    calculate();
  }

  function updateUnit() {
    const u = document.getElementById('unit').value;
    document.getElementById('unit-badge').textContent = u;
  }

  function fmt(val, unit) {
    if (val === 0) return '0';
    if (val >= 1000 && (unit === 'g' || unit === 'ml')) {
      return (val / 1000).toFixed(3).replace(/\.?0+$/, '') + (unit === 'g' ? ' kg' : ' L');
    }
    // Round to max 3 decimals, remove trailing zeros
    return parseFloat(val.toFixed(3)).toString();
  }

  function calculate() {
    const input = parseFloat(document.getElementById('amount').value);
    const unit = document.getElementById('unit').value;
    const area = document.getElementById('results-area');

    if (!input || input <= 0) {
      area.innerHTML = `<div class="empty-state"><div class="empty-icon">⚗️</div>Enter an amount above to calculate</div>`;
      return;
    }

    const r = ratios[currentRatio];
    const total = r.a + r.b;
    const amtA = (input * r.a) / total;
    const amtB = (input * r.b) / total;
    const pctA = ((r.a / total) * 100).toFixed(1);
    const pctB = ((r.b / total) * 100).toFixed(1);

    area.innerHTML = `
      <div class="result-grid">
        <div class="result-box resin result-updated">
          <div class="result-label">Resin (A)</div>
          <div class="result-component">Part ${r.a} of ${total}</div>
          <div class="result-value">${fmt(amtA, unit)}<span class="result-unit">${unit}</span></div>
        </div>
        <div class="result-box hardener result-updated">
          <div class="result-label">Hardener (B)</div>
          <div class="result-component">Part ${r.b} of ${total}</div>
          <div class="result-value">${fmt(amtB, unit)}<span class="result-unit">${unit}</span></div>
        </div>
      </div>
      <div class="total-bar">
        <span class="total-label">Total Mix</span>
        <span class="total-value">${fmt(input, unit)} <span style="font-size:16px;opacity:.6">${unit}</span></span>
      </div>
      <div class="mix-visual">
        <div class="bar-a" style="width:${pctA}%"></div>
        <div class="bar-b" style="width:${pctB}%"></div>
      </div>
      <div class="bar-labels">
        <span style="color:rgba(245,200,66,0.7)">▌ Resin A — ${pctA}%</span>
        <span style="color:rgba(96,200,232,0.7)">Hardener B — ${pctB}% ▌</span>
      </div>
      <div class="tip-box">
        <strong>Mix order:</strong> Pour resin (A) first, then add hardener (B). Stir slowly for 3–5 min, scraping sides and bottom.
      </div>
    `;
  }
</script>
</body>
</html>
